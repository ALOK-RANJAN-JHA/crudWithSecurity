spring.application.name=crudWithSecurity
spring.datasource.url=jdbc:mysql://localhost:3306/crud_with_jwt?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Alokjha@13
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== JPA / Hibernate ==========
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect optional (Hibernate can auto-detect)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ========== Thymeleaf ==========
spring.thymeleaf.cache=true


# Session timeout (inactivity)
server.servlet.session.timeout=1h