<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>Employees</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="p-4 bg-light">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Employees</h2>
      <div>
        <form id="logoutForm" th:action="@{/logout}" method="post" style="display:inline-block">
          <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
      </div>
    </div>

    <div class="mb-3"><a class="btn btn-primary" href="/employee-form">➕ Add Employee</a></div>

    <table class="table table-striped" id="empTable">
      <thead class="table-dark"><tr><th>ID</th><th>Name</th><th>Department</th><th>Salary</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      fetch('/api/employees').then(r => r.ok ? r.json() : []).then(list => {
        const tbody = document.querySelector('#empTable tbody'); tbody.innerHTML='';
        list.forEach(e => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${e.id}</td><td>${e.name}</td><td>${e.department}</td><td>${e.salary ?? ''}</td>
            <td>
              <a class="btn btn-sm btn-info me-1" href="/employee-form?id=${e.id}">Edit</a>
              <button class="btn btn-sm btn-danger" onclick="deleteEmployee(${e.id})">Delete</button>
            </td>`;
          tbody.appendChild(tr);
        });
      });
    });

    async function deleteEmployee(id) {
      if (!confirm('Delete?')) return;
      const res = await fetch('/api/employees/' + id, { method: 'DELETE' });
      if (res.ok) location.reload();
      else alert('Delete failed');
    }
  </script>
</body>
</html>
