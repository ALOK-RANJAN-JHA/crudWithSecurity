<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>Employee Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light p-4">
  <div class="container" style="max-width:600px">
    <div class="card p-3 shadow-sm">
      <h4 id="formTitle">Add Employee</h4>
      <form id="empForm">
        <input id="empId" type="hidden"/>
        <div class="mb-3"><label>Name</label><input id="empName" class="form-control" required minlength="2"/></div>
        <div class="mb-3"><label>Department</label><input id="empDept" class="form-control" required/></div>
        <div class="mb-3"><label>Salary</label><input id="empSalary" type="number" class="form-control" min="0"/></div>
        <div class="d-flex gap-2">
          <button id="save" class="btn btn-success">Save</button>
          <a class="btn btn-secondary" href="/employees">Back</a>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    if (id) {
      fetch('/api/employees/' + id).then(r => r.json()).then(e => {
        document.getElementById('empId').value = e.id;
        document.getElementById('empName').value = e.name;
        document.getElementById('empDept').value = e.department;
        document.getElementById('empSalary').value = e.salary ?? '';
        document.getElementById('formTitle').innerText='Edit Employee';
      });
    }

    document.getElementById('empForm').addEventListener('submit', async ev => {
      ev.preventDefault();
      const payload = {
        name: document.getElementById('empName').value.trim(),
        department: document.getElementById('empDept').value.trim(),
        salary: document.getElementById('empSalary').value ? parseFloat(document.getElementById('empSalary').value) : null
      };
      const eid = document.getElementById('empId').value;
      const url = eid ? '/api/employees/' + eid : '/api/employees';
      const method = eid ? 'PUT' : 'POST';
      const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (res.ok) window.location='/employees';
      else alert('Save failed');
    });
  </script>
</body>
</html>
