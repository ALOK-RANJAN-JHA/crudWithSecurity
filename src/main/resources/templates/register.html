<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:480px">
  <div class="card p-4 shadow-sm">
    <h3 class="text-center mb-3">Register</h3>
    <form th:action="@{/register}" th:object="${user}" method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input th:field="*{username}" class="form-control" required/>
        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input th:field="*{password}" type="password" class="form-control" required/>
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger"></div>
      </div>

      <button class="btn btn-success w-100" type="submit">Register</button>
    </form>
    <div class="mt-3 text-center"><a th:href="@{/login}">Login</a></div>
    <div th:if="${error}" class="text-danger mt-2 text-center" th:text="${error}"></div>
  </div>
</div>
</body>
</html>
