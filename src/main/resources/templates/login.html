<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width:420px">
  <div class="card p-4 shadow-sm">
    <h3 class="text-center mb-3">Login</h3>

    <form th:action="@{/login}" method="post">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus/>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required/>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me"/>
        <label class="form-check-label" for="remember-me">Remember me</label>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="mt-3 text-center">
      <a th:href="@{/register}">Register</a>
    </div>

    <div th:if="${param.error}" class="text-danger mt-2 text-center">Invalid credentials.</div>
    <div th:if="${param.logout}" class="text-success mt-2 text-center">Logged out successfully.</div>
    <div th:if="${param.expired}" class="text-warning mt-2 text-center">Session expired. Please login again.</div>
    <div th:if="${param.registered}" class="text-success mt-2 text-center">Registration successful. Please login.</div>
  </div>
</div>
</body>
</html>
